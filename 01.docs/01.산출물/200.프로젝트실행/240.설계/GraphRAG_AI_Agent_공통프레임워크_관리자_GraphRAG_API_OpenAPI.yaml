openapi: 3.0.3
info:
  title: GraphRAG AI Agent Admin and GraphRAG API
  version: 0.1.0
  description: |
    GraphRAG AI Agent 공통 프레임워크의 관리자 및 GraphRAG API OpenAPI 명세이다.
    Source 관리, IndexJob 실행/상태조회, GraphRAG 검색 테스트, Agent 실행 API를 포함한다.
  contact:
    name: GraphRAG AI Agent Framework Team
servers:
  - url: http://localhost:8000
    description: Local development
  - url: https://api.example.com
    description: Deployment placeholder
tags:
  - name: Sources
    description: 관리자 Source 등록/조회/수정/삭제/Preview API
  - name: IndexJobs
    description: 관리자 IndexJob 생성/실행/상태조회/재시도/취소 API
  - name: RetrievalTests
    description: 관리자 GraphRAG 검색 테스트 API
  - name: AgentRuns
    description: Agent 실행 및 결과 조회 API

security:
  - bearerAuth: []

paths:
  /api/admin/graphrag/sources:
    get:
      tags: [Sources]
      summary: Source 목록조회
      operationId: listSources
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/DomainCodeQuery'
        - name: source_type
          in: query
          schema:
            $ref: '#/components/schemas/SourceType'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/SourceStatus'
        - name: keyword
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/SizeQuery'
        - $ref: '#/components/parameters/SortQuery'
      responses:
        '200':
          description: Source 목록조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/SourceSummary'
                      meta:
                        $ref: '#/components/schemas/PageMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Sources]
      summary: Source 등록
      operationId: createSource
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSourceRequest'
      responses:
        '201':
          description: Source 등록 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CreateSourceResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/admin/graphrag/sources/{source_id}:
    get:
      tags: [Sources]
      summary: Source 상세조회
      operationId: getSource
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/SourceIdPath'
      responses:
        '200':
          description: Source 상세조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SourceDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Sources]
      summary: Source 수정
      operationId: updateSource
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/SourceIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSourceRequest'
      responses:
        '200':
          description: Source 수정 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SourceDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '423':
          $ref: '#/components/responses/Locked'
    delete:
      tags: [Sources]
      summary: Source 삭제 또는 비활성화
      operationId: deleteSource
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/SourceIdPath'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteSourceRequest'
      responses:
        '200':
          description: Source 삭제 또는 비활성화 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DeleteSourceResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '423':
          $ref: '#/components/responses/Locked'

  /api/admin/graphrag/sources/{source_id}/preview:
    get:
      tags: [Sources]
      summary: Source Preview 조회
      operationId: previewSource
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/SourceIdPath'
        - name: document_id
          in: query
          schema:
            type: string
            format: uuid
        - name: result_type
          in: query
          schema:
            type: string
            enum: [CHUNK, ENTITY, RELATION, EVIDENCE]
        - name: keyword
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/SizeQuery'
      responses:
        '200':
          description: Source Preview 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SourcePreview'
                      meta:
                        $ref: '#/components/schemas/PageMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/admin/graphrag/index-jobs:
    get:
      tags: [IndexJobs]
      summary: IndexJob 목록조회
      operationId: listIndexJobs
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/DomainCodeQuery'
        - name: source_id
          in: query
          schema:
            type: string
            format: uuid
        - name: job_type
          in: query
          schema:
            $ref: '#/components/schemas/IndexJobType'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/IndexJobStatus'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/SizeQuery'
      responses:
        '200':
          description: IndexJob 목록조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/IndexJobSummary'
                      meta:
                        $ref: '#/components/schemas/PageMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [IndexJobs]
      summary: IndexJob 생성
      operationId: createIndexJob
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIndexJobRequest'
      responses:
        '201':
          description: IndexJob 생성 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CreateIndexJobResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/admin/graphrag/index-jobs/{job_id}:
    get:
      tags: [IndexJobs]
      summary: IndexJob 상태조회
      operationId: getIndexJob
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/JobIdPath'
      responses:
        '200':
          description: IndexJob 상태조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/IndexJobDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/admin/graphrag/index-jobs/{job_id}/run:
    post:
      tags: [IndexJobs]
      summary: IndexJob 실행
      operationId: runIndexJob
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/JobIdPath'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunIndexJobRequest'
      responses:
        '202':
          description: IndexJob 실행 요청 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RunIndexJobResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/admin/graphrag/index-jobs/{job_id}/retry:
    post:
      tags: [IndexJobs]
      summary: IndexJob 재시도
      operationId: retryIndexJob
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/JobIdPath'
      responses:
        '202':
          description: IndexJob 재시도 요청 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/IndexJobActionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '423':
          $ref: '#/components/responses/Locked'

  /api/admin/graphrag/index-jobs/{job_id}/cancel:
    post:
      tags: [IndexJobs]
      summary: IndexJob 취소
      operationId: cancelIndexJob
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/JobIdPath'
      responses:
        '202':
          description: IndexJob 취소 요청 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/IndexJobActionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '423':
          $ref: '#/components/responses/Locked'

  /api/admin/graphrag/retrieval-tests:
    post:
      tags: [RetrievalTests]
      summary: GraphRAG 검색 테스트 실행
      operationId: runRetrievalTest
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunRetrievalTestRequest'
      responses:
        '200':
          description: GraphRAG 검색 테스트 실행 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RetrievalRunResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admin/graphrag/retrieval-tests/{retrieval_run_id}:
    get:
      tags: [RetrievalTests]
      summary: GraphRAG 검색 테스트 결과 조회
      operationId: getRetrievalTest
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/RetrievalRunIdPath'
      responses:
        '200':
          description: GraphRAG 검색 테스트 결과 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RetrievalRunResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/agents/{agent_id}/runs:
    post:
      tags: [AgentRuns]
      summary: Agent 실행
      operationId: runAgent
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/AgentIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunAgentRequest'
      responses:
        '202':
          description: Agent 실행 요청 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RunAgentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/agents/{agent_id}/runs/{agent_run_id}:
    get:
      tags: [AgentRuns]
      summary: Agent 실행 결과 조회
      operationId: getAgentRun
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/AgentIdPath'
        - $ref: '#/components/parameters/AgentRunIdPath'
      responses:
        '200':
          description: Agent 실행 결과 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AgentRunDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    TenantIdHeader:
      name: X-Tenant-Id
      in: header
      required: false
      schema:
        type: string
      description: 멀티 테넌트 식별자
    DomainCodeQuery:
      name: domain_code
      in: query
      required: false
      schema:
        type: string
      description: 도메인 코드
    PageQuery:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    SizeQuery:
      name: size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    SortQuery:
      name: sort
      in: query
      required: false
      schema:
        type: string
        example: created_at,desc
    SourceIdPath:
      name: source_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    JobIdPath:
      name: job_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RetrievalRunIdPath:
      name: retrieval_run_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AgentIdPath:
      name: agent_id
      in: path
      required: true
      schema:
        type: string
    AgentRunIdPath:
      name: agent_run_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: 요청값 검증 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    Unauthorized:
      description: 인증 필요
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    Forbidden:
      description: 접근 권한 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    NotFound:
      description: 리소스 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    Conflict:
      description: 중복 또는 상태 충돌
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    Locked:
      description: 현재 상태에서 수행할 수 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    InternalServerError:
      description: 서버 또는 외부 연계 오류
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'

  schemas:
    ApiSuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          example: true
        data:
          nullable: true
        meta:
          $ref: '#/components/schemas/ResponseMeta'

    ApiErrorResponse:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          example: false
        error:
          $ref: '#/components/schemas/ApiError'
        meta:
          $ref: '#/components/schemas/ResponseMeta'

    ApiError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum:
            - GRAG-SRC-001
            - GRAG-SRC-002
            - GRAG-SRC-003
            - GRAG-SRC-404
            - GRAG-SRC-409
            - GRAG-SRC-423
            - GRAG-JOB-001
            - GRAG-JOB-002
            - GRAG-JOB-404
            - GRAG-JOB-409
            - GRAG-JOB-423
            - GRAG-JOB-500
            - GRAG-RET-001
            - GRAG-RET-002
            - GRAG-RET-404
            - GRAG-RET-500
            - GRAG-VEC-001
            - GRAG-GPH-001
            - GRAG-GPH-002
            - GRAG-AGT-001
            - GRAG-AGT-404
            - GRAG-AGT-409
            - GRAG-AGT-500
            - GRAG-LLM-001
            - GRAG-AUTH-401
            - GRAG-AUTH-403
            - GRAG-AUTH-404
        message:
          type: string
        detail:
          type: object
          additionalProperties: true
          nullable: true

    ResponseMeta:
      type: object
      properties:
        request_id:
          type: string
          example: req-20260621-0001
        timestamp:
          type: string
          format: date-time

    PageMeta:
      allOf:
        - $ref: '#/components/schemas/ResponseMeta'
        - type: object
          properties:
            page:
              type: integer
            size:
              type: integer
            total_count:
              type: integer
            total_pages:
              type: integer

    SourceType:
      type: string
      enum: [FILE, URL, API, DATABASE, MANUAL, GENERATED]

    SourceStatus:
      type: string
      enum: [REGISTERED, INDEXING, INDEXED, PARTIAL_INDEXED, FAILED, DELETED]

    SourceScope:
      type: string
      enum: [PRIVATE, DOMAIN, PUBLIC]

    IndexJobType:
      type: string
      enum: [FULL_INDEX, REINDEX, PARSE_ONLY, EMBED_ONLY, GRAPH_EXTRACT_ONLY, DELETE_INDEX]

    IndexJobStatus:
      type: string
      enum: [PENDING, RUNNING, COMPLETED, FAILED, CANCELED, RETRYING, PARTIAL_COMPLETED]

    RetrievalStrategy:
      type: string
      enum: [VECTOR_ONLY, GRAPH_ONLY, HYBRID, HYBRID_RERANK]

    AgentRunStatus:
      type: string
      enum: [PENDING, RUNNING, COMPLETED, FAILED, CANCELED, TIMEOUT]

    SourceIndexOptions:
      type: object
      properties:
        chunk_size:
          type: integer
          minimum: 200
          maximum: 4000
          default: 1000
        chunk_overlap:
          type: integer
          minimum: 0
          default: 150
        embedding_model:
          type: string
          example: text-embedding-3-large
        extract_entities:
          type: boolean
          default: true
        extract_relations:
          type: boolean
          default: true
        link_evidence:
          type: boolean
          default: true

    CreateSourceRequest:
      type: object
      required: [domain_code, source_type, title, scope]
      properties:
        domain_code:
          type: string
          example: SOLBAT
        source_type:
          $ref: '#/components/schemas/SourceType'
        title:
          type: string
          maxLength: 300
          example: 솔밭 투자 보고서
        description:
          type: string
          nullable: true
        scope:
          $ref: '#/components/schemas/SourceScope'
        uri:
          type: string
          nullable: true
          example: storage://kb/sol_bat/tomato_pest_guide.pdf
        manual_text:
          type: string
          nullable: true
        metadata_json:
          type: object
          additionalProperties: true
          default: {}
        index_options:
          $ref: '#/components/schemas/SourceIndexOptions'
        auto_create_index_job:
          type: boolean
          default: false

    CreateSourceResponse:
      type: object
      properties:
        source:
          $ref: '#/components/schemas/SourceDetail'
        index_job_id:
          type: string
