          type: string
          enum: [INFO, WARN, ERROR]
        message:
          type: string
        detail:
          type: object
          additionalProperties: true
          nullable: true

    RunRetrievalTestRequest:
      type: object
      required: [query, domain_code, strategy]
      properties:
        query:
          type: string
          example: 솔밭 투자 보고서에서 핵심 위험 요소를 알려줘
        domain_code:
          type: string
          example: SOLBAT
        source_ids:
          type: array
          items:
            type: string
            format: uuid
        strategy:
          $ref: '#/components/schemas/RetrievalStrategy'
        top_k:
          type: integer
          minimum: 1
          maximum: 50
          default: 10
        graph_depth:
          type: integer
          minimum: 0
          maximum: 5
          default: 2
        min_score:
          type: number
          format: float
          minimum: 0
          maximum: 1
          default: 0
        include_evidence:
          type: boolean
          default: true
        include_graph_context:
          type: boolean
          default: true
        filters:
          type: object
          additionalProperties: true
          default: {}

    RetrievalRunResult:
      type: object
      properties:
        retrieval_run_id:
          type: string
          format: uuid
        query:
          type: string
        domain_code:
          type: string
        strategy:
          $ref: '#/components/schemas/RetrievalStrategy'
        status:
          type: string
          enum: [HIT, MISS, PARTIAL_HIT, FILTERED_OUT, FALLBACK_USED, FAILED]
        hit_count:
          type: integer
        elapsed_ms:
          type: integer
        fallback_used:
          type: boolean
        context_summary:
          type: string
          nullable: true
        results:
          type: array
          items:
            $ref: '#/components/schemas/RetrievalResult'
        evidence:
          type: array
          items:
            $ref: '#/components/schemas/EvidencePreview'
        graph_paths:
          type: array
          items:
            $ref: '#/components/schemas/GraphPath'
