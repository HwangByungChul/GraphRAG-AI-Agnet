          type: object
          additionalProperties: true
          nullable: true

    RetrievalResult:
      type: object
      properties:
        result_id:
          type: string
          format: uuid
        result_type:
          type: string
          enum: [CHUNK, ENTITY, RELATION, EVIDENCE]
        source_id:
          type: string
          format: uuid
        source_title:
          type: string
        chunk_id:
          type: string
          format: uuid
          nullable: true
        entity_id:
          type: string
          format: uuid
          nullable: true
        relation_id:
          type: string
          format: uuid
          nullable: true
        score:
          type: number
          format: float
        snippet:
          type: string
        metadata_json:
          type: object
          additionalProperties: true

    GraphPath:
      type: object
      properties:
        path_id:
          type: string
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/GraphNode'
