      allOf:
        - $ref: '#/components/schemas/IndexJobSummary'
        - type: object
          properties:
            step_status:
              type: array
              items:
                $ref: '#/components/schemas/IndexJobStep'
            logs:
              type: array
              items:
                $ref: '#/components/schemas/IndexJobLog'
            error_code:
              type: string
              nullable: true
            error_message:
              type: string
              nullable: true

    IndexJobStep:
      type: object
      properties:
        step_name:
          type: string
          enum: [PARSE_DOCUMENT, CHUNKING, EMBEDDING, ENTITY_EXTRACTION, RELATION_EXTRACTION, EVIDENCE_LINKING, CLEANUP]
        status:
          $ref: '#/components/schemas/IndexJobStatus'
        total_count:
          type: integer
        processed_count:
          type: integer
        failed_count:
          type: integer

    IndexJobLog:
      type: object
      properties:
