          default: NORMAL
        index_options:
          $ref: '#/components/schemas/SourceIndexOptions'
        force_rebuild:
          type: boolean
          default: false
        dry_run:
          type: boolean
          default: false

    CreateIndexJobResponse:
      type: object
      properties:
        job_id:
          type: string
          format: uuid
        source_id:
          type: string
          format: uuid
